apiVersion: v1
kind: Service
metadata:
  name: wallabag
spec:
  selector:
    app: wallabag
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: wallabag-db
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: wallabag-redis
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
