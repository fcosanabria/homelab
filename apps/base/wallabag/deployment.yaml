apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      containers:
        - name: wallabag
          image: wallabag/wallabag:latest
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_mysql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: db
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "3306"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_CHARSET
              value: utf8mb4
            - name: SYMFONY__ENV__DATABASE_TABLE_PREFIX
              value: "wallabag_"
            - name: SYMFONY__ENV__MAILER_DSN
              value: "smtp://127.0.0.1"
            - name: SYMFONY__ENV__FROM_EMAIL
              value: "wallabag@example.com"
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: "https://wallabag.fcosanabria.com"
            - name: SYMFONY__ENV__SERVER_NAME
              value: "Wallabag"
            - name: SYMFONY__ENV__REDIS_HOST
              value: redis
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-secrets
                  key: SYMFONY__ENV__DATABASE_PASSWORD
          volumeMounts:
            - name: wallabag-images
              mountPath: /var/www/wallabag/web/assets/images
      volumes:
        - name: wallabag-images
          persistentVolumeClaim:
            claimName: wallabag-images-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag-db
  template:
    metadata:
      labels:
        app: wallabag-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-secrets
                  key: MYSQL_ROOT_PASSWORD
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/healthcheck.sh
                - --innodb_initialized
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: wallabag-db-data
              mountPath: /var/lib/mysql
      volumes:
        - name: wallabag-db-data
          persistentVolumeClaim:
            claimName: wallabag-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag-redis
  template:
    metadata:
      labels:
        app: wallabag-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
