apiVersion: apps/v1
kind: Deployment
metadata:
  name: agendav
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agendav
  template:
    metadata:
      labels:
        app: agendav
    spec:
      containers:
        - name: agendav
          image: ghcr.io/nagimov/agendav-docker:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: agendav-config
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
